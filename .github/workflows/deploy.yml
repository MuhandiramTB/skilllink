name: CI/CD Pipeline

# Runs on pushes to main/develop and PRs to main.
#  test  → typecheck + unit tests + lint (every push/PR)
#  build → build & push web+api Docker images to GHCR        (main only)
#  deploy→ trigger Render deploy via deploy hook             (main only)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # e.g. muhandiramtb/skilllink

jobs:
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Typecheck Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: Unit tests (API)
        run: npm test --workspace apps/api

      - name: Lint
        run: npm run lint --workspaces --if-present
        continue-on-error: true # don't fail the pipeline on style-only lint nits

  # --------------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write # push to GHCR
    strategy:
      matrix:
        app: [api, web] # build both images in parallel
    steps:
      - uses: actions/checkout@v4

      # GHCR requires lowercase repo names; github.repository may contain capitals.
      - name: Lowercase image name
        run: echo "IMAGE=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: . # repo root — Dockerfiles reference the monorepo
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}-${{ matrix.app }}:latest
            ${{ env.IMAGE }}-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # OPTIONAL API auto-deploy to Azure Container Apps (build → push to ACR → roll
  # the app, health-gated = blue-green). SKIPS automatically unless these repo
  # secrets are set: AZURE_CREDENTIALS, ACR_NAME, ACA_NAME, ACA_RESOURCE_GROUP.
  # Until then, deploy the API manually with `./deploy-api.ps1` (one command).
  # The web auto-deploys via Vercel's own GitHub integration regardless.
  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      # 'true' only when the Azure credential secret is configured; gates the job.
      AZURE_CONFIGURED: ${{ secrets.AZURE_CREDENTIALS != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        if: ${{ env.AZURE_CONFIGURED == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build, push to ACR, and update the Container App
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          ACA_NAME: ${{ secrets.ACA_NAME }}
          ACA_RG: ${{ secrets.ACA_RESOURCE_GROUP }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$AZURE_CONFIGURED" != "true" ]; then
            echo "Azure secrets not set — skipping API auto-deploy. (Set AZURE_CREDENTIALS, ACR_NAME, ACA_NAME, ACA_RESOURCE_GROUP.)"
            exit 0
          fi
          az acr login --name "$ACR_NAME"
          IMAGE="${ACR_NAME}.azurecr.io/skilllink-api:${SHA}"
          docker build -f apps/api/Dockerfile -t "$IMAGE" -t "${ACR_NAME}.azurecr.io/skilllink-api:latest" .
          docker push "$IMAGE"
          docker push "${ACR_NAME}.azurecr.io/skilllink-api:latest"
          # Roll the container app to the new image (Azure does a health-gated swap).
          az containerapp update --name "$ACA_NAME" --resource-group "$ACA_RG" --image "$IMAGE"
          echo "API deployed: $IMAGE"
