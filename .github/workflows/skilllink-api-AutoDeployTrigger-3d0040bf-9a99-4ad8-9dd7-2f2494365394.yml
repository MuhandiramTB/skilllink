name: Trigger auto deployment for skilllink-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/skilllink-api-AutoDeployTrigger-3d0040bf-9a99-4ad8-9dd7-2f2494365394.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SKILLLINKAPI_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cae7363edd89acr.azurecr.io
          registryUsername: ${{ secrets.SKILLLINKAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SKILLLINKAPI_REGISTRY_PASSWORD }}
          containerAppName: skilllink-api
          resourceGroup: skilllink-rg
          imageToBuild: cae7363edd89acr.azurecr.io/skilllink-api:${{ github.sha }}
          
            

     

