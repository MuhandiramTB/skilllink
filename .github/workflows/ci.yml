name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skilllink
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skilllink

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      # Build the schema + seed (so integration tests have a real DB)
      - name: Apply schema & seed
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d skilllink -f db/migrations/001_init.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d skilllink -f db/seeds/001_seed_kandy_and_categories.sql

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test --if-present
