# ============================================================================
# Render Blueprint (infra-as-code) — SkillLink LK.
# Render provisions the API + Next.js web services (free auto-HTTPS, blue-green
# rollouts via health checks). The DATABASE lives on NEON (free Postgres, no
# 90-day expiry, supports PostGIS) — NOT on Render — for the longest-lasting free
# setup. You paste the Neon connection string into the API's DATABASE_URL env var.
# Docs: https://render.com/docs/blueprint-spec
# ============================================================================

services:
  # ---- API (NestJS) ----
  - type: web
    name: skilllink-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health # Render waits for 200 here before switching traffic
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: '4000'
      - key: AUTH_VERIFIER
        value: mock # set to 'firebase' + add creds for real OTP
      - key: DATABASE_URL
        sync: false # paste your Neon connection string here in the Render dashboard
        # e.g. postgresql://user:pass@ep-xxx.region.aws.neon.tech/skilllink?sslmode=require
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render generates a strong secret (satisfies the boot guard)
      - key: PAYMENT_MOCK_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to the web service URL after first deploy

  # ---- Web (Next.js) ----
  - type: web
    name: skilllink-web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      # NEXT_PUBLIC_API_URL is baked at build time — set it as a build arg in the
      # Render dashboard (Docker build args) to the API's public URL + /api/v1.
