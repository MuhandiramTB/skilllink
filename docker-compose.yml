# ============================================================================
# SkillLink LK — local production-like multi-container stack.
#   web (Next.js) → api (NestJS) → db (PostgreSQL + PostGIS)
# Run:  docker compose up --build
# Then: web http://localhost:3000 · api http://localhost:4000/api/v1/health
# ============================================================================

services:
  db:
    image: postgis/postgis:15-3.4-alpine # PostGIS — the app uses geography columns
    environment:
      POSTGRES_USER: skilllink
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
      POSTGRES_DB: skilllink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-load the full schema + seeds (migrations 001–012, idempotent) on first
      # boot of an empty data volume. The postgis image runs *.sql in this dir once.
      - ./submission/render-db-setup.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skilllink -d skilllink']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app-network]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # Local prod-like simulation. NODE_ENV stays 'development' so the mock auth
      # verifier is allowed (the prod boot-guard forbids mock when NODE_ENV=production).
      # Real production (render.yaml) sets NODE_ENV=production + AUTH_VERIFIER=firebase.
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://skilllink:${DB_PASSWORD:-devpass}@db:5432/skilllink
      API_PORT: '4000'
      AUTH_VERIFIER: ${AUTH_VERIFIER:-mock}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      PAYMENT_MOCK_SECRET: ${PAYMENT_MOCK_SECRET:-dev-pay-secret}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy # wait for Postgres to accept connections
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [app-network]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the browser bundle at build time — the browser reaches the API
        # via the host's published port.
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    environment:
      # Runtime, server-side only: Next.js server components fetch the API by its
      # compose service name (localhost inside the container = the web container).
      API_URL_SERVER: http://api:4000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks: [app-network]
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
